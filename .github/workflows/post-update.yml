name: Post-Update Commands

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "packages/site/package.json"
      - "package-lock.json"

permissions:
  contents: read

concurrency:
  group: post-update-${{ github.event_name == 'push' && github.ref_name || github.head_ref }}
  cancel-in-progress: true

jobs:
  post-upgrade-commit:
    # For pull_request_target: only run for PRs from the same repo (not forks)
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install dependencies
        run: |
          npm ci

      - name: Update MSW worker script
        run: |
          npx --workspace @yay-machine/site msw init

      - name: Fix formatting
        if: github.event_name == 'pull_request_target'
        run: |
          npm run fix

      - name: Print diffs
        run: |
          git diff

      - name: Commit and Push changes
        id: commit_and_push
        run: |
          # Commit only if there are changes
          if ! git diff --quiet; then
            git add .
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: run post-update tasks"
            git push origin HEAD:${{ github.event_name == 'push' && github.ref_name || github.head_ref }}
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger build workflow
        if: steps.commit_and_push.outputs.committed == 'true' && github.event_name == 'pull_request_target'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: '${{ github.head_ref }}'
            })
